# AOP — Agent Operating Procedure for the Video Factory project.
# Git-backed (Spine's aop-repo); promotion = signed tag. Drives run_invocation:
#   model call -> guardrails -> connector allow-list -> approval gate -> hash-chained audit.
# Modeled on report_factory@0.1.0.

id: video_factory
version: 0.1.0
title: Video Factory — image-to-video batch run
tenant_scope: [flipkart, bgo_internal]

planner:
  # Per-project LLM (separate from Spine's Anthropic planner). Report Factory uses the same pattern.
  provider_env: ADK_PROVIDER          # google | openai | anthropic
  model_env: VF_AGENT_MODEL
  daily_token_budget_env: VF_LLM_DAILY_TOKEN_BUDGET

guardrails:
  - never_empty_output                # a job must produce a clip or a structured failure, never silence
  - spec_compliance                   # finished clip must validate against the locked OutputSpec
  - cost_ceiling_per_job              # reject if estimated cost exceeds the per-job ceiling

connector:
  name: video-factory
  allow_list:
    - video_factory.ingest_batch
    - video_factory.list_jobs
    - video_factory.get_job
    - video_factory.generate
    - video_factory.qc_decision
    - video_factory.deliver

# The governed pipeline. READ steps run live; WRITE steps pass the approval gate before executing.
# Most jobs auto-approve at QC (clean ~65%); flagged jobs (~35%) wait in Spine's Approvals queue.
steps:
  - id: ingest
    skill: build_prompt
    access: read
    description: Read FSN manifest row; build prompt + choose model route (Kling default; Seedance for hero/difficult prints).

  - id: generate
    skill: generate_clip
    access: write
    gate: approval
    auto_approve_when: "estimated_cost_usd <= cost_ceiling_per_job"   # batch generation auto-approves under ceiling; audited
    on_failure: fallback_model        # primary degrades -> secondary (Kling->Seedance; fal->Replicate)
    description: Image-to-video, audio off. Failed fal tasks don't consume credits.

  - id: finish
    skill: finish_clip
    access: read
    description: Deterministic FFmpeg finishing to the locked spec. 100% automatable; no model call.

  - id: qc
    skill: qc_check
    access: write
    gate: approval
    auto_approve_when: "auto_checks.passed and vlm_flags.empty"       # Posture C: clean -> auto-approve; flagged -> human
    central_review_queue: true
    description: Auto-check battery + VLM flags. Flagged jobs route to the human review UI (Spine Approvals).

  - id: deliver
    skill: deliver_clip
    access: write
    gate: approval
    human_approval_required: false    # delivery auto-proceeds once QC approved; the gate is QC
    description: Publish to Google Drive; write status + output link back to the manifest sheet.

audit:
  hash_chained: true                  # every step appended to the tamper-evident audit log
  tag: [tenant_id, project, fsn, job_id]
