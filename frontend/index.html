<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Influencer Factory — Console</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">★</span>
      <div>
        <h1>AI Influencer Factory</h1>
        <p class="sub">characters · storyboards · auto-assembled reels</p>
      </div>
    </div>
    <div class="env" id="env-chips"><!-- chips injected --></div>
  </header>

  <section class="stats" id="stats"><!-- stat cards injected --></section>

  <main>
    <section class="panel characters">
      <h2>Characters</h2>
      <div id="char-list" class="char-list"></div>
      <details class="char-new">
        <summary>+ New character</summary>
        <form id="char-form">
          <div class="row2">
            <label>Name <input type="text" id="c-name" placeholder="Luna" required /></label>
            <label>Species
              <select id="c-species"><option value="person">person</option><option value="animal">animal</option></select></label>
          </div>
          <label>DNA prompt <small>(look description — mints/bootstraps the character)</small>
            <textarea id="c-dna" rows="2" placeholder="a 24 year old woman, sun-kissed, long wavy brunette hair, natural glamour, photorealistic"></textarea></label>
          <div class="row2">
            <label>Niche <input type="text" id="c-niche" placeholder="travel & glamour" /></label>
            <label>Safety tolerance <small>(1 strict – 6 permissive)</small>
              <input type="number" id="c-safety" min="1" max="6" value="5" /></label>
          </div>
          <button type="submit" id="char-btn">Create character</button>
          <p class="hint" id="char-msg"></p>
        </form>
      </details>
    </section>

    <section class="panel newpost">
      <h2>New post</h2>
      <form id="post-form">
        <label>Character <select id="p-character" required></select></label>
        <label>Brief <input type="text" id="p-brief" placeholder="beach travel day" /></label>
        <div class="opts row">
          <label class="opt col"><span>Format</span>
            <select id="p-format"><option value="reel">reel (9:16)</option><option value="square">square (1:1)</option><option value="longform">longform (16:9)</option></select></label>
          <label class="opt col"><span>Shots</span><input type="number" id="p-shots" min="1" max="12" value="6" /></label>
          <label class="opt col"><span>Video budget</span><input type="number" id="p-video" min="0" max="12" value="2" /></label>
        </div>
        <label>Scene tags <small>(comma-separated, optional)</small>
          <input type="text" id="p-tags" placeholder="travel, glamour" /></label>
        <div class="opts">
          <label class="opt"><input type="checkbox" id="p-execute" />
            <span>Execute <small>(real paid fal.ai calls)</small></span></label>
          <label class="opt"><input type="checkbox" id="p-human" />
            <span>Human QC gate</span></label>
        </div>
        <div class="post-actions">
          <button type="button" class="ghost" id="preview-btn">Preview &amp; price</button>
          <button type="submit" id="post-btn">Create &amp; run</button>
        </div>
        <p class="hint" id="post-msg"></p>
        <div id="preview-box" class="preview-box" hidden></div>
      </form>
    </section>

    <section class="panel jobs">
      <div class="jobs-head">
        <h2>Posts</h2>
        <div class="filters" id="filters"></div>
        <button class="ghost" id="run-btn" title="Process any pending posts">Run pending</button>
      </div>
      <div id="worker-banner" class="worker-banner" hidden></div>
      <div class="table-wrap">
        <table id="jobs-table">
          <thead><tr>
            <th>Character</th><th>Post</th><th>Format</th><th>Shots</th><th>State</th>
            <th>Cost</th><th>SLA</th><th>Output</th><th></th>
          </tr></thead>
          <tbody id="jobs-body"></tbody>
        </table>
        <p class="empty" id="empty">No posts yet — create a character, then a post.</p>
      </div>
    </section>
  </main>

  <div class="drawer-backdrop" id="backdrop" hidden></div>
  <aside class="drawer" id="drawer" hidden>
    <button class="close" id="drawer-close">✕</button>
    <div id="drawer-body"></div>
  </aside>

  <script src="/app.js"></script>
</body>
</html>
